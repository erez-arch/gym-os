<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GYM OS</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .hero {
      position: relative;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .hero img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      filter: brightness(0.38) saturate(0.8);
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.1) 0%,
        rgba(180,10,10,0.08) 50%,
        rgba(0,0,0,0.7) 100%
      );
    }

    .hero-content {
      position: relative;
      text-align: center;
      z-index: 2;
    }

    .kanji {
      font-size: clamp(1rem, 3vw, 1.4rem);
      letter-spacing: 0.6em;
      color: #e63030;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
      opacity: 0.85;
    }

    h1 {
      font-size: clamp(4rem, 12vw, 9rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1;
      background: linear-gradient(135deg, #ffffff 30%, #e63030 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      margin-top: 1.2rem;
      font-size: clamp(0.85rem, 2vw, 1.1rem);
      letter-spacing: 0.35em;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
    }

    .dog-hero {
      margin-top: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .dog-hero img {
      width: min(200px, 45vw);
      border-radius: 50%;
      border: 3px solid rgba(230,48,48,0.4);
      box-shadow: 0 0 40px rgba(230,48,48,0.2);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .dog-label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
    }

    .badge {
      display: inline-block;
      margin-top: 2.5rem;
      padding: 0.55rem 1.6rem;
      border: 1px solid rgba(230,48,48,0.5);
      border-radius: 2px;
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      color: #e63030;
      text-transform: uppercase;
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50%       { opacity: 1; }
    }

    .bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #e63030, transparent);
    }

  </style>
</head>
<body>
  <section class="hero">
    <img
      src="https://images.unsplash.com/photo-1544717305-2782549b5136?w=1920&q=80"
      alt="Japanese athletes training"
      onerror="this.style.display='none'"
    />
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <p class="kanji">ジム・オペレーティングシステム</p>
      <h1>GYM OS</h1>
      <p class="subtitle">Train Smarter &nbsp;·&nbsp; Perform Better</p>

      <div class="dog-hero">
        <img
          src="https://images.unsplash.com/photo-1552053831-71594a27632d?w=400&q=80"
          alt="golden retriever mascot"
        />
        <span class="dog-label">Official Mascot</span>
      </div>

      <span class="badge">Coming Soon</span>
    </div>
    <div class="bar"></div>
  </section>


</body>
</html>
